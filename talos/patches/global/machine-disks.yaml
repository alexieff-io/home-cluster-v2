machine:
  disks:
    - device: /dev/nvme0n1 # The name of the disk to use.
      partitions:
        # Longhorn replica storage. Pinned to a fixed size (was: unset = whole
        # disk) so a second partition can hold the container image store.
        - mountpoint: /var/lib/longhorn
          size: 1800GiB
        # Container image store (containerd) relocated off the ~29 GB SD-card
        # EPHEMERAL partition (/dev/mmcblk0p6), which was hitting imagefs/nodefs
        # eviction pressure. No size = use the remaining ~130 GiB of the NVMe.
        #
        # NOTE: etcd intentionally stays on the SD-card EPHEMERAL partition.
        # Relocating /var/lib/etcd to a user NVMe partition was attempted and
        # reverted on 2026-06-26 — Talos's etcd lifecycle/recovery assumes etcd on
        # EPHEMERAL, and moving it broke node rejoin (rogue single-node clusters,
        # stuck "waiting to join"). The container-image-store move alone removes
        # the dominant SD-card I/O load, which is what was starving etcd.
        #
        # Applying this to an already-partitioned NVMe requires wiping the disk —
        # see docs/runbooks/move-etcd-image-store-to-nvme.md and run
        # scripts/move-etcd-image-store-to-nvme.sh (node-by-node).
        - mountpoint: /var/lib/containerd
