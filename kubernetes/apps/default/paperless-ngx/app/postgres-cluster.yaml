---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-ngx-postgres
  namespace: default
spec:
  instances: 3

  # Pinned to the arm64 manifest digest (= tag 16.3). The cluster's registry
  # mirror (Spegel) was serving a stale amd64 variant for the :16.3 tag, causing
  # "exec format error" on the arm64 nodes. Pulling by digest is content-addressed
  # and bypasses the broken tag resolution. Revert to the plain tag once the
  # mirror/tag resolution is healthy again. (2026-06-26)
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3@sha256:e05e2d5dc0a87696b1d75e5b3ac39611444c6e34e8f2d3c29efa452fb5aa52aa

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"

  storage:
    storageClass: longhorn
    size: 20Gi

  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-ngx-postgres-superuser

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
