---
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-meteo-sync-scripts
data:
  sync-entrypoint.sh: |
    #!/bin/sh
    set -e

    MODELS="dwd_icon ncep_gfs013 ncep_gfs025 ecmwf_ifs025 jma_gsm bom_access_global cams_global copernicus_era5_land cams_europe copernicus_era5"
    VARIABLES="temperature_2m,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,dew_point_2m,relative_humidity_2m,precipitation,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,snow_depth,snowfall,visibility,uv_index,cape,sunshine_duration,soil_temperature_0cm,apparent_temperature,shortwave_radiation,pm10,pm2_5,nitrogen_dioxide,carbon_monoxide,ozone,sulphur_dioxide,european_aqi,us_aqi,ozone,nitrogen_dioxide"

    cleanup() {
      echo "Caught signal, stopping sync processes..."
      kill -- -$$ 2>/dev/null || true
      wait
      exit 0
    }

    trap cleanup TERM INT

    for model in $MODELS; do
      echo "Starting sync for $model"
      /app/openmeteo-api sync "$model" "$VARIABLES" \
        --past-days 3 \
        --repeat-interval 5 \
        --concurrent 2 &
    done

    wait
