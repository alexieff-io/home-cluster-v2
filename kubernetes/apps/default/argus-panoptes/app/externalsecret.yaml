---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argus-panoptes
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: argus-panoptes-secrets
    template:
      engineVersion: v2
      data:
        # Argus daemon secrets
        ARGUS_ORACLE_API_KEY: "{{ .oracleApiKey }}"
        ARGUS_HERALD_SLACK_WEBHOOK: "{{ .heraldSlackWebhook }}"
        # Flow API secrets
        FLOW_API_JWT_SECRET: "{{ .flowApiJwtSecret }}"
        FLOW_API_CLICKHOUSE_USER: "{{ .clickhouseUser }}"
        FLOW_API_CLICKHOUSE_PASSWORD: "{{ .clickhousePassword }}"
        FLOW_API_LLM_API_KEY: "{{ .flowApiLlmApiKey }}"
        # ClickHouse & ingestor credentials (same user for both)
        CLICKHOUSE_USER: "{{ .clickhouseUser }}"
        CLICKHOUSE_PASSWORD: "{{ .clickhousePassword }}"
  data:
    - secretKey: oracleApiKey
      remoteRef:
        key: argus-panoptes
        property: oracle_api_key
    - secretKey: heraldSlackWebhook
      remoteRef:
        key: argus-panoptes
        property: herald_slack_webhook
    - secretKey: flowApiJwtSecret
      remoteRef:
        key: argus-panoptes
        property: flow_api_jwt_secret
    - secretKey: clickhouseUser
      remoteRef:
        key: argus-panoptes
        property: clickhouse_user
    - secretKey: clickhousePassword
      remoteRef:
        key: argus-panoptes
        property: clickhouse_password
    - secretKey: flowApiLlmApiKey
      remoteRef:
        key: argus-panoptes
        property: flow_api_llm_api_key
