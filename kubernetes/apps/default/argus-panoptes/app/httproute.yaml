---
# Exposes the Panoptes dashboard on the internal (LAN-only) gateway.
# The dashboard service name is generated by the Helm chart as argus-panoptes-dashboard.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argus-panoptes
  namespace: default
spec:
  hostnames:
    - "argus.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: argus-panoptes-dashboard
          port: 3000
