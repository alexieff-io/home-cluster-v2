---
# Native VMPodScrape instead of PodMonitor: the argus daemon container does not
# declare a named port, so a PodMonitor/targetPort generates a keep-filter on
# __meta_kubernetes_pod_container_port_number that drops all pods. Using
# VMPodScrape with explicit address relabeling scrapes port 9090 directly.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: argus-panoptes
  namespace: default
  labels:
    app.kubernetes.io/name: argus-panoptes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argus-panoptes
      app.kubernetes.io/instance: argus-panoptes
      app.kubernetes.io/component: watcher
  podMetricsEndpoints:
    - interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      relabelConfigs:
        - sourceLabels: [__meta_kubernetes_pod_ip]
          targetLabel: __address__
          replacement: "$1:9090"
