---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-hp-scan-to
spec:
  chartRef:
    kind: OCIRepository
    name: node-hp-scan-to
  interval: 1h
  values:
    controllers:
      node-hp-scan-to:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/manuc66/node-hp-scan-to
              tag: master
            env:
              # TODO: replace with actual printer IP before committing
              IP: 192.168.11.249
              PATTERN: '"scan"_dd.mm.yyyy_hh:MM:ss'
              LABEL: scan
              DIR: /scans
              TZ: America/New_York
              PUID: "1000"
              PGID: "1000"
              KEEP_FILES: "true"
              PAPERLESS_POST_DOCUMENT_URL: http://paperless-ngx.default.svc.cluster.local:8000/api/documents/post_document/
            envFrom:
              - secretRef:
                  name: node-hp-scan-to-secrets
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID"]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      scans:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /scans
