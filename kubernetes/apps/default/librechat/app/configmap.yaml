---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: default
data:
  librechat.yaml: |
    version: 1.3.6
    cache: true
    endpoints:
      custom:
        - name: "OpenAI"
          apiKey: "${OPENAI_API_KEY}"
          baseURL: "https://litellm.lan.haxrcorp.com/v1"
          models:
            default: ["gpt-5", "gpt-4.1", "gpt-4.1-mini", "o3", "o4-mini"]
            fetch: true
          titleConvo: true
          titleModel: "gpt-4.1-mini"
          summarize: false
          modelDisplayLabel: "OpenAI"

        - name: "Anthropic"
          apiKey: "${OPENAI_API_KEY}"
          baseURL: "https://litellm.lan.haxrcorp.com/v1"
          models:
            default: ["anthropic/claude-opus-4-6", "anthropic/claude-sonnet-4-6", "anthropic/claude-haiku-4-5"]
            fetch: true
          titleConvo: true
          titleModel: "anthropic/claude-sonnet-4-6"
          summarize: false
          modelDisplayLabel: "Anthropic"

        - name: "Google"
          apiKey: "${OPENAI_API_KEY}"
          baseURL: "https://litellm.lan.haxrcorp.com/v1"
          models:
            default: ["gemini/gemini-2.5-pro", "gemini/gemini-2.5-flash", "gemini/gemini-2.0-flash"]
            fetch: true
          titleConvo: true
          titleModel: "gemini/gemini-2.5-flash"
          summarize: false
          modelDisplayLabel: "Google"
