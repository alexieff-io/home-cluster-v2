---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name arc-runner-set
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 1h
  values:
    githubConfigUrl: https://github.com/alexieff-io
    githubConfigSecret:
      name: arc-github-pat
    runnerScaleSetName: *name
    minRunners: 0
    maxRunners: 5
