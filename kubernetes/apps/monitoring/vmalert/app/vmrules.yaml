---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: kubernetes-cluster-health
  namespace: monitoring
spec:
  groups:
    - name: kubernetes-cluster-health
      interval: 1m
      rules:
        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been NotReady for more than 5 minutes."

        - alert: KubeNodeUnreachable
          expr: kube_node_spec_taint{key="node.kubernetes.io/unreachable",effect="NoSchedule"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is unreachable"
            description: "Node {{ $labels.node }} has been unreachable for more than 5 minutes."

        - alert: KubeNodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} under memory pressure"
            description: "Kubelet on {{ $labels.node }} is reporting MemoryPressure."

        - alert: KubeNodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} under disk pressure"
            description: "Kubelet on {{ $labels.node }} is reporting DiskPressure."

        - alert: KubeletDown
          expr: up{job="monitoring/kubelet"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubelet on {{ $labels.node }} is down"
            description: "Kubelet on {{ $labels.node }} has been unscrapeable for more than 5 minutes."
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: kubernetes-workload-health
  namespace: monitoring
spec:
  groups:
    - name: kubernetes-workload-health
      interval: 1m
      rules:
        - alert: KubePodCrashLooping
          expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crashlooping"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for more than 10 minutes."

        - alert: KubePodNotReady
          expr: |
            sum by (namespace, pod) (
              max by (namespace, pod) (
                kube_pod_status_phase{phase=~"Pending|Unknown"}
              ) * on (namespace, pod) group_left(owner_kind) topk by (namespace, pod) (
                1, max by (namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"})
              )
            ) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in non-ready state for more than 30 minutes."

        - alert: KubeContainerOOMKilled
          expr: increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) > 0
          labels:
            severity: warning
          annotations:
            summary: "Container OOMKilled in {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled in the last 10 minutes."

        - alert: KubeJobFailed
          expr: kube_job_failed > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
            description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed to complete."

        - alert: KubeDeploymentReplicasMismatch
          expr: |
            (
              kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            ) and (
              changes(kube_deployment_status_replicas_updated[10m]) == 0
            )
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched its expected replica count for 15 minutes."
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: kubernetes-resource-saturation
  namespace: monitoring
spec:
  groups:
    - name: kubernetes-resource-saturation
      interval: 1m
      rules:
        - alert: NodeCPUSaturated
          expr: |
            100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU > 90%"
            description: "Node {{ $labels.instance }} has CPU usage above 90% for the last 15 minutes."

        - alert: NodeMemorySaturated
          expr: |
            100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory > 90%"
            description: "Node {{ $labels.instance }} has memory usage above 90% for the last 15 minutes."

        - alert: NodeFilesystemAlmostFull
          expr: |
            100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|fuse.*|squashfs|ramfs"}
                       / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|fuse.*|squashfs|ramfs"})) > 85
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} > 85%"
            description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has been above 85% full for 30 minutes."

        - alert: PVCAlmostFull
          expr: |
            100 * (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} > 85%"
            description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been above 85% full for 15 minutes."
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cluster-platform
  namespace: monitoring
spec:
  groups:
    - name: cluster-platform
      interval: 1m
      rules:
        - alert: FluxKustomizationFailed
          expr: gotk_reconcile_condition{kind="Kustomization",type="Ready",status="False"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Flux Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} failing"
            description: "Flux Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} has been failing for more than 15 minutes."

        - alert: FluxHelmReleaseFailed
          expr: gotk_reconcile_condition{kind="HelmRelease",type="Ready",status="False"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Flux HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} failing"
            description: "Flux HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} has been failing for more than 15 minutes."

        - alert: CertManagerCertExpiringSoon
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in <14d"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in {{ $value | printf \"%.0f\" }} days."

        - alert: CertManagerCertNotReady
          expr: certmanager_certificate_ready_status{condition="True"} == 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} not ready"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} has not been Ready for over an hour."
