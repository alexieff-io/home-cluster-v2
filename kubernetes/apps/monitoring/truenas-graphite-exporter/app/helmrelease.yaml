---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truenas-graphite-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: truenas-graphite-exporter
  interval: 1h
  values:
    controllers:
      truenas-graphite-exporter:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/supporterino/truenas-graphite-to-prometheus
              tag: v2.2.1
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &metricsPort 9108
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      # In-cluster metrics endpoint scraped by vmagent.
      app:
        controller: truenas-graphite-exporter
        ports:
          metrics:
            port: *metricsPort
      # LAN-internal LoadBalancer for the Graphite line-protocol ingest, so
      # TrueNAS's Netdata reporter can push directly to a stable IP without
      # going through the cluster's HTTP gateway. Cilium LBIPAM assigns the IP
      # from the 10.69.0.0/24 pool — not exposed to the public internet.
      graphite:
        controller: truenas-graphite-exporter
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "10.69.0.30"
        ports:
          graphite-tcp:
            port: &graphitePort 9109
            protocol: TCP
          graphite-udp:
            port: *graphitePort
            protocol: UDP
    serviceMonitor:
      app:
        serviceName: truenas-graphite-exporter-app
        endpoints:
          # honorLabels keeps the job=truenas and instance=<host> labels that
          # graphite_exporter applies via the mapping file. Without this, the
          # scrape config's own job/instance win and the upstream TrueNAS
          # dashboards' {job="truenas"} selector matches nothing.
          - port: metrics
            interval: 30s
            honorLabels: true
    # Override the upstream image's baked-in mapping at /config/graphite_mapping.conf
    # with our patched copy (greedy regexes fixed — see file header for details).
    persistence:
      mapping:
        type: configMap
        name: truenas-graphite-exporter-mapping
        advancedMounts:
          truenas-graphite-exporter:
            app:
              - path: /config/graphite_mapping.conf
                subPath: graphite_mapping.conf
                readOnly: true
