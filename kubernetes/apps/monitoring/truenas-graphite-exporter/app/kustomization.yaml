---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: truenas-graphite-exporter-dashboards
    files:
      - dashboards/truenas_scale.json
      - dashboards/truenas_scale_applications_k3s.json
      - dashboards/truenas_scale_cgroups.json
      - dashboards/truenas_scale_disk_insights.json
      - dashboards/truenas_scale_temperatures.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: TrueNAS
  - name: truenas-graphite-exporter-mapping
    files:
      - graphite_mapping.conf
generatorOptions:
  disableNameSuffixHash: true
