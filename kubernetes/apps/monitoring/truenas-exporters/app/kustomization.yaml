---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./vmstaticscrape.yaml
configMapGenerator:
  - name: truenas-exporters-dashboards
    files:
      - dashboards/truenas-overview.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: TrueNAS
generatorOptions:
  disableNameSuffixHash: true
