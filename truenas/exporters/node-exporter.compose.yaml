---
# TrueNAS Custom App — Prometheus node_exporter
# Install: TrueNAS UI → Apps → Custom App → Install via YAML, paste this file.
#
# Exposes host CPU / memory / disk / network / filesystem metrics on :9100.
# Host networking is required so the exporter sees real interfaces and disks
# rather than a Docker network bridge.
services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.zfs                          # ARC stats from /proc/spl/kstat/zfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/db)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
    volumes:
      - /:/host:ro,rslave
